{% extends 'base-sign.html' %}

{% block title %}
  Sign Up | SNS Roomify
{% endblock %}

{% block content %}
  <div>
    <div class="signup-box">
      <form id="signupForm" action="/signup" method="POST" autocomplete="off">
        <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" required />
        <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" required />
        <input type="tel" id="phone" name="phone" placeholder="Phone Number" autocomplete="tel" required />
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="new-password" required />
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" autocomplete="new-password" required />
        <button type="submit">Sign Up</button>
      </form>
      <div class="signin-link">
        Already have an account?
        <a href="/signin">Sign In</a>
      </div>
    </div>
  </div>
{% endblock %}
