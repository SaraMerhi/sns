<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - SNS Roomify</title>
    <link rel="stylesheet" href="/static/css/contact.css" />
  </head>
  <body>
    <div class="contact-container">
      <div class="contact-form">
        <h1>Contact Us</h1>
        <form action="/submit-contact" method="POST">
          <input type="text" name="name" placeholder="Full Name" required />
          <input type="email" name="email" placeholder="Email Address" required />
          <textarea name="message" placeholder="Message" required></textarea>
          <button type="submit">Submit</button>
          <div id="errorMessage" class="error-message {% if not error_message %}hidden{% endif %}">{{ error_message or '' }}</div>
        </form>
      </div>
      <div class="social-panel">
        <p>Stay updated with room ideas, design tips, and new features.</p>
        <div class="social-links">
          <a href="https://www.facebook.com/SNSRoomify" target="_blank" aria-label="Facebook">
            <img src="/static/images/facebook.png" alt="Facebook" />
          </a>
          <a href="https://www.twitter.com/SNSRoomify" target="_blank" aria-label="Twitter">
            <img src="/static/images/twitter.png" alt="Twitter" />
          </a>
          <a href="https://www.instagram.com/SNSRoomify" target="_blank" aria-label="Instagram">
            <img src="/static/images/instagram.png" alt="Instagram" />
          </a>
        </div>
      </div>
    </div>
    <div id="toast" class="toast hidden">{{ success_message or '' }}</div>

    <script>
      const toast = document.getElementById('toast');
      const successMessage = {{ success_message|tojson }};

      if (successMessage) {
        toast.textContent = successMessage;
        toast.classList.remove('hidden');
        toast.classList.add('show');

        setTimeout(() => {
          window.location.href = '/';
        }, 2500);
      }
    </script>
