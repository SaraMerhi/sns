{% macro confirm_modal(id, title, message='', confirm_text='Confirm', confirm_style='danger', cancel_text='Cancel', form_id=none, message_id=none, confirm_href=none) %}
<div id="{{ id }}" class="modal" data-modal>
    <div class="modal-content confirm-modal-content">
        <h2 class="modal-title modal-title-{{ confirm_style }}">{{ title }}</h2>
        <p {% if message_id %}id="{{ message_id }}"{% else %}data-modal-message{% endif %}>{{ message }}</p>
        <div class="modal-actions">
            <button type="button" class="cancel-btn" data-modal-close="{{ id }}">{{ cancel_text }}</button>
            {% if form_id %}
            <form id="{{ form_id }}" method="POST" style="display: inline;">
                <button type="submit" class="confirm-btn confirm-btn-{{ confirm_style }}">{{ confirm_text }}</button>
            </form>
            {% elif confirm_href %}
            <button type="button" class="confirm-btn confirm-btn-{{ confirm_style }}" data-modal-confirm-href="{{ confirm_href }}">{{ confirm_text }}</button>
            {% endif %}
        </div>
    </div>
</div>
{% endmacro %}
