<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Completed | SNS Roomify</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user-dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/room-complete.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="admin-container">

        {% include 'components/sidebar.html' %}

        <main class="main-content">
            <div class="overlay"></div>

            <div class="complete-container">

                <div class="complete-card">

                    <h1>
                        Your {{ room_title }} Is Ready!
                    </h1>

                    <p>
                        Thank you for creating your room with SNS Roomify.
                        Your design has been successfully saved and is now available in your account.
                    </p>

                    <div class="actions">

                        <a href="/user-dashboard" class="btn-primary">
                            Home Page
                        </a>

                        <a href="/saved-rooms" class="btn-secondary">
                            My Saved Rooms
                        </a>

                    </div>

                </div>

            </div>
        </main>
    </div>

</body>
</html>
